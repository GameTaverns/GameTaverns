workflows:
  ios-build:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GameTaverns
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APP_STORE_APP_ID: "6759586784"
        APP_VERSION_BASE: "1.0"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gametaverns.app
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Patch Capacitor plugins
        script: |
          node scripts/patch-capacitor.cjs
      - name: Build web assets
        script: |
          npm run build -- --mode ios
      - name: Add iOS platform
        script: |
          npx cap add ios
      - name: Clean previous build artifacts
        script: |
          rm -rf ios/App/App/public
          rm -rf ios/App/build
      - name: Sync iOS platform
        script: |
          npx cap sync ios
      - name: Add Firebase Messaging SDK via SPM
        script: |
          PACKAGE_SWIFT="ios/App/CapApp-SPM/Package.swift"
          if [ ! -f "$PACKAGE_SWIFT" ]; then
            echo "ERROR: $PACKAGE_SWIFT not found"
            exit 1
          fi

          if grep -q "firebase-ios-sdk" "$PACKAGE_SWIFT"; then
            echo "Firebase SDK already in Package.swift"
          else
            python3 - "$PACKAGE_SWIFT" << 'PYEOF'
          import sys
          path = sys.argv[1]
          with open(path, "r") as f:
              content = f.read()
          # Add firebase-ios-sdk package dependency
          content = content.replace(
              "dependencies: [",
              'dependencies: [\n        .package(url: "https://github.com/firebase/firebase-ios-sdk.git", from: "11.0.0"),',
              1
          )
          # Add FirebaseMessaging target dependency after Capacitor product
          content = content.replace(
              '.product(name: "Capacitor"',
              '.product(name: "Capacitor"',
              1
          )
          # Insert FirebaseMessaging after the line containing .product(name: "Capacitor"
          lines = content.split("\n")
          new_lines = []
          for line in lines:
              new_lines.append(line)
              if '.product(name: "Capacitor"' in line:
                  indent = "                "
                  new_lines.append(indent + '.product(name: "FirebaseMessaging", package: "firebase-ios-sdk"),')
          with open(path, "w") as f:
              f.write("\n".join(new_lines))
          print("Patched Package.swift with Firebase")
          PYEOF
            echo "✓ Added Firebase Messaging SDK via SPM"
          fi

          echo "=== Package.swift contents ==="
          cat "$PACKAGE_SWIFT"

          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
          echo "✓ SPM packages resolved with Firebase"
      - name: Copy GoogleService-Info.plist and add to Xcode project
        script: |
          cp ios-config/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          plutil -lint ios/App/App/GoogleService-Info.plist
          echo "✓ GoogleService-Info.plist copied and validated"

          # Add GoogleService-Info.plist to Xcode project resources so it's bundled in the .app
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          if grep -q "GoogleService-Info.plist" "$PBXPROJ"; then
            echo "GoogleService-Info.plist already in Xcode project"
          else
            python3 - "$PBXPROJ" << 'PYEOF'
          import sys, uuid, re

          path = sys.argv[1]
          with open(path, "r") as f:
              content = f.read()

          # Generate unique IDs (24 hex chars)
          file_ref_id = uuid.uuid4().hex[:24].upper()
          build_file_id = uuid.uuid4().hex[:24].upper()

          # Add PBXFileReference
          file_ref_entry = f'\t\t{file_ref_id} /* GoogleService-Info.plist */ = {{isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = "GoogleService-Info.plist"; sourceTree = "<group>"; }};\n'
          content = content.replace(
              '/* End PBXFileReference section */',
              file_ref_entry + '/* End PBXFileReference section */',
              1
          )

          # Add PBXBuildFile
          build_file_entry = f'\t\t{build_file_id} /* GoogleService-Info.plist in Resources */ = {{isa = PBXBuildFile; fileRef = {file_ref_id} /* GoogleService-Info.plist */; }};\n'
          content = content.replace(
              '/* End PBXBuildFile section */',
              build_file_entry + '/* End PBXBuildFile section */',
              1
          )

          # Add to PBXResourcesBuildPhase
          # Find the resources build phase and add our file
          resources_pattern = r'(files = \([^)]*)(\/\* End PBXResourcesBuildPhase|\)\;)'
          # Simpler: find "/* Resources */" section and add to its files list
          resource_line = f'\t\t\t\t{build_file_id} /* GoogleService-Info.plist in Resources */,\n'
          # Insert into the first "Resources" build phase files list
          content = content.replace(
              '/* Resources */',
              '/* Resources */',
              1
          )
          # Find files = ( after Resources and add entry
          idx = content.find('/* Resources */')
          if idx != -1:
              files_idx = content.find('files = (', idx)
              if files_idx != -1:
                  insert_pos = files_idx + len('files = (\n')
                  content = content[:insert_pos] + resource_line + content[insert_pos:]

          # Add to the App group children
          # Find the App group and add the file reference
          app_group_match = content.find('/* App */ = {\n\t\t\tisa = PBXGroup;')
          if app_group_match != -1:
              children_idx = content.find('children = (', app_group_match)
              if children_idx != -1:
                  insert_pos2 = children_idx + len('children = (\n')
                  group_entry = f'\t\t\t\t{file_ref_id} /* GoogleService-Info.plist */,\n'
                  content = content[:insert_pos2] + group_entry + content[insert_pos2:]

          with open(path, "w") as f:
              f.write(content)
          print("Added GoogleService-Info.plist to Xcode project")
          PYEOF
            echo "✓ GoogleService-Info.plist added to Xcode project resources"
          fi
      - name: Add Push Notification entitlements
        script: |
          # Copy entitlements file
          cp ios-config/App.entitlements ios/App/App/App.entitlements
          echo "✓ App.entitlements copied"

          # Add entitlements to Xcode project build settings
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          if grep -q "CODE_SIGN_ENTITLEMENTS" "$PBXPROJ"; then
            echo "Entitlements already referenced in project"
          else
            # Inject entitlements into all build configurations
            sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.gametaverns.app;/PRODUCT_BUNDLE_IDENTIFIER = com.gametaverns.app;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App\/App.entitlements;/g' "$PBXPROJ"
            echo "✓ Entitlements injected into Xcode project"
          fi

          # Enable push notifications capability via adding to Info.plist
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" "$PLIST" 2>/dev/null || true
          echo "✓ Background remote-notification mode enabled"
      - name: Wire Capacitor push callbacks in AppDelegate
        script: |
          APP_DELEGATE="ios/App/App/AppDelegate.swift"
          if [ ! -f "$APP_DELEGATE" ]; then
            echo "ERROR: AppDelegate.swift not found at $APP_DELEGATE"
            exit 1
          fi

          # Add Firebase import at top of file
          if ! grep -q "import FirebaseMessaging" "$APP_DELEGATE"; then
            sed -i '' '1s/^/import FirebaseCore\nimport FirebaseMessaging\n/' "$APP_DELEGATE"
            echo "✓ Added Firebase imports to AppDelegate"
          fi

          # Add FirebaseApp.configure() before "return true" in didFinishLaunchingWithOptions
          # Wrapped in guard to prevent crash if GoogleService-Info.plist is missing
          if ! grep -q "FirebaseApp.configure()" "$APP_DELEGATE"; then
            LINE_NUM=$(grep -n "return true" "$APP_DELEGATE" | head -1 | cut -d: -f1)
            if [ -n "$LINE_NUM" ]; then
              head -n $((LINE_NUM - 1)) "$APP_DELEGATE" > /tmp/AppDelegate_fb.swift
              echo "        if let _ = Bundle.main.path(forResource: \"GoogleService-Info\", ofType: \"plist\") {" >> /tmp/AppDelegate_fb.swift
              echo "            FirebaseApp.configure()" >> /tmp/AppDelegate_fb.swift
              echo "        }" >> /tmp/AppDelegate_fb.swift
              tail -n +$LINE_NUM "$APP_DELEGATE" >> /tmp/AppDelegate_fb.swift
              cp /tmp/AppDelegate_fb.swift "$APP_DELEGATE"
              echo "✓ Added FirebaseApp.configure() to AppDelegate (guarded)"
            else
              echo "WARNING: Could not find 'return true' in AppDelegate for Firebase init"
            fi
          fi

          if grep -q "capacitorDidRegisterForRemoteNotifications" "$APP_DELEGATE"; then
            echo "Push callbacks already present in AppDelegate.swift"
          else
            LAST_BRACE=$(grep -n "^}" "$APP_DELEGATE" | tail -1 | cut -d: -f1)
            if [ -z "$LAST_BRACE" ]; then
              echo "ERROR: Could not find closing brace in AppDelegate.swift"
              exit 1
            fi
            head -n $((LAST_BRACE - 1)) "$APP_DELEGATE" > /tmp/AppDelegate_patched.swift
            echo "" >> /tmp/AppDelegate_patched.swift
            echo "    func application(_ application: UIApplication, didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {" >> /tmp/AppDelegate_patched.swift
            echo "      Messaging.messaging().apnsToken = deviceToken" >> /tmp/AppDelegate_patched.swift
            echo "      Messaging.messaging().token { token, error in" >> /tmp/AppDelegate_patched.swift
            echo "        if let error = error {" >> /tmp/AppDelegate_patched.swift
            echo "          print(\"FCM token fetch error: \\(error)\")" >> /tmp/AppDelegate_patched.swift
            echo "          NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: deviceToken)" >> /tmp/AppDelegate_patched.swift
            echo "          return" >> /tmp/AppDelegate_patched.swift
            echo "        }" >> /tmp/AppDelegate_patched.swift
            echo "        if let token = token, !token.isEmpty {" >> /tmp/AppDelegate_patched.swift
            echo "          NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: token)" >> /tmp/AppDelegate_patched.swift
            echo "        } else {" >> /tmp/AppDelegate_patched.swift
            echo "          NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: deviceToken)" >> /tmp/AppDelegate_patched.swift
            echo "        }" >> /tmp/AppDelegate_patched.swift
            echo "      }" >> /tmp/AppDelegate_patched.swift
            echo "    }" >> /tmp/AppDelegate_patched.swift
            echo "" >> /tmp/AppDelegate_patched.swift
            echo "    func application(_ application: UIApplication, didFailToRegisterForRemoteNotificationsWithError error: Error) {" >> /tmp/AppDelegate_patched.swift
            echo "      NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)" >> /tmp/AppDelegate_patched.swift
            echo "    }" >> /tmp/AppDelegate_patched.swift
            echo "" >> /tmp/AppDelegate_patched.swift
            tail -n +$LAST_BRACE "$APP_DELEGATE" >> /tmp/AppDelegate_patched.swift
            cp /tmp/AppDelegate_patched.swift "$APP_DELEGATE"
            echo "✓ Injected Capacitor push callbacks with Firebase token mapping into AppDelegate.swift"
          fi

          echo "=== Final AppDelegate.swift ==="
          cat "$APP_DELEGATE"
          echo "=== Verify AppDelegate push callbacks ==="
          grep -n "FirebaseCore\|FirebaseMessaging\|FirebaseApp.configure\|capacitorDidRegisterForRemoteNotifications\|Messaging.messaging().apnsToken" "$APP_DELEGATE" || {
            echo "ERROR: push callback verification failed"
            exit 1
          }
      - name: Inject privacy strings into Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'GameTaverns needs access to your photo library to let you upload profile pictures and game images.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'GameTaverns needs access to your photo library to let you upload profile pictures and game images.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'GameTaverns needs access to your camera to let you take photos of games and your collection.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'GameTaverns needs access to your camera to let you take photos of games and your collection.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          echo "Privacy strings and export compliance injected:"
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryUsageDescription" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :ITSAppUsesNonExemptEncryption" "$PLIST"
      - name: Set app icon
        script: |
          ICON_SOURCE="resources/ios/AppIcon.png"
          ICONSET_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          SIZES="20 29 40 58 60 76 80 87 120 152 167 180 1024"
          for SIZE in $SIZES; do
            sips -z $SIZE $SIZE "$ICON_SOURCE" --out "$ICONSET_DIR/AppIcon-${SIZE}x${SIZE}.png"
          done
          cat > "$ICONSET_DIR/Contents.json" << 'EOF'
          {
            "images": [
              {"size":"20x20","idiom":"iphone","scale":"2x","filename":"AppIcon-40x40.png"},
              {"size":"20x20","idiom":"iphone","scale":"3x","filename":"AppIcon-60x60.png"},
              {"size":"29x29","idiom":"iphone","scale":"2x","filename":"AppIcon-58x58.png"},
              {"size":"29x29","idiom":"iphone","scale":"3x","filename":"AppIcon-87x87.png"},
              {"size":"40x40","idiom":"iphone","scale":"2x","filename":"AppIcon-80x80.png"},
              {"size":"40x40","idiom":"iphone","scale":"3x","filename":"AppIcon-120x120.png"},
              {"size":"60x60","idiom":"iphone","scale":"2x","filename":"AppIcon-120x120.png"},
              {"size":"60x60","idiom":"iphone","scale":"3x","filename":"AppIcon-180x180.png"},
              {"size":"20x20","idiom":"ipad","scale":"1x","filename":"AppIcon-20x20.png"},
              {"size":"20x20","idiom":"ipad","scale":"2x","filename":"AppIcon-40x40.png"},
              {"size":"29x29","idiom":"ipad","scale":"1x","filename":"AppIcon-29x29.png"},
              {"size":"29x29","idiom":"ipad","scale":"2x","filename":"AppIcon-58x58.png"},
              {"size":"40x40","idiom":"ipad","scale":"1x","filename":"AppIcon-40x40.png"},
              {"size":"40x40","idiom":"ipad","scale":"2x","filename":"AppIcon-80x80.png"},
              {"size":"76x76","idiom":"ipad","scale":"1x","filename":"AppIcon-76x76.png"},
              {"size":"76x76","idiom":"ipad","scale":"2x","filename":"AppIcon-152x152.png"},
              {"size":"83.5x83.5","idiom":"ipad","scale":"2x","filename":"AppIcon-167x167.png"},
              {"size":"1024x1024","idiom":"ios-marketing","scale":"1x","filename":"AppIcon-1024x1024.png"}
            ],
            "info":{"version":1,"author":"xcode"}
          }
          EOF
      - name: Generate release notes
        script: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log "$LAST_TAG"..HEAD --pretty=format:"• %s" --no-merges | head -20)
          else
            NOTES=$(git log --pretty=format:"• %s" --no-merges -10)
          fi
          NOTES=$(echo "$NOTES" | sed 's/• [a-z]*[(a-z)]*: /• /g; s/• [a-z]*: /• /g')
          if [ -z "$NOTES" ]; then
            NOTES="• Bug fixes and improvements"
          fi
          echo "Release notes:"
          echo "$NOTES"
          echo "RELEASE_NOTES<<EOF" >> $CM_ENV
          echo "$NOTES" >> $CM_ENV
          echo "EOF" >> $CM_ENV
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
          echo "=== AVAILABLE CODE SIGN IDENTITIES ==="
          security find-identity -v -p codesigning || true
          echo "=== INSTALLED PROVISIONING PROFILES ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true
      - name: Increment build number and set version
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo "0")
          NEXT=$(( ${LATEST:-0} + 1 ))
          if [ "$NEXT" -lt 3 ]; then NEXT=3; fi
          echo "Setting build number to $NEXT"
          agvtool new-version -all $NEXT
          VERSION="${APP_VERSION_BASE}.${NEXT}"
          echo "Setting marketing version to $VERSION"
          agvtool new-marketing-version "$VERSION"
      - name: Build ipa for distribution
        script: |
          mkdir -p /tmp/xcodebuild_logs
          set -o pipefail
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            2>&1 | tee /tmp/xcodebuild_logs/build.log
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== LAST 150 LINES OF BUILD LOG ==="
            tail -150 /tmp/xcodebuild_logs/build.log
            echo "=== GREPPED XCODE ERRORS (build-ipa log) ==="
            grep -n "error:" /tmp/xcodebuild_logs/build.log | tail -120 || true

            echo "=== RE-RUNNING RAW XCODEBUILD FOR FULL DIAGNOSTICS ==="
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -destination generic/platform=iOS \
              -archivePath /tmp/xcodebuild_logs/App-debug.xcarchive \
              archive \
              COMPILER_INDEX_STORE_ENABLE=NO \
              DEVELOPMENT_TEAM=8XRW572298 \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              CODE_SIGN_STYLE=Manual \
              2>&1 | tee /tmp/xcodebuild_logs/raw-xcodebuild.log || true

            echo "=== GREPPED XCODE ERRORS (raw xcodebuild) ==="
            grep -n "error:\|CodeSign\|Provisioning profile\|No signing certificate\|entitlements" /tmp/xcodebuild_logs/raw-xcodebuild.log | tail -200 || true
            exit $BUILD_EXIT
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
        beta_groups:
          - External Testers
      email:
        recipients:
          - tzolakis@gmail.com
        notify:
          success: true
          failure: true

  android-build:
    name: Android Build & Google Play
    max_build_duration: 60
    environment:
      node: 22
      java: 21
      vars:
        PACKAGE_NAME: "com.gametaverns.app"
        APP_VERSION_BASE: "1.0"
      android_signing:
        - gametaverns_keystore
      groups:
        - google_play
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Patch Capacitor plugins
        script: |
          node scripts/patch-capacitor.cjs
      - name: Build web assets
        script: |
          npm run build -- --mode android
      - name: Add Android platform
        script: |
          npx cap add android
      - name: Clean previous build artifacts
        script: |
          rm -rf android/app/src/main/assets/public
          rm -rf android/app/build
      - name: Sync Android platform
        script: |
          npx cap sync android
      - name: Print signing certificate fingerprints
        script: |
          echo "Computing fingerprints from Codemagic signing keystore..."
          keytool -list -v \
            -keystore "$CM_KEYSTORE_PATH" \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -alias "$CM_KEY_ALIAS" \
            -keypass "$CM_KEY_PASSWORD" | grep -E "SHA1:|SHA256:|SHA-1:|SHA-256:" || {
              echo "ERROR: Could not parse SHA fingerprints from keytool output"
              exit 1
            }
      - name: Copy google-services.json
        script: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
            echo "✓ google-services.json copied to android/app/"
          else
            echo "ERROR: google-services.json not found in project root!"
            exit 1
          fi
      - name: Verify Firebase Android wiring
        script: |
          set -e
          FILE="android/app/google-services.json"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE missing"
            exit 1
          fi

          PACKAGE=$(grep -o '"package_name"[[:space:]]*:[[:space:]]*"[^"]*"' "$FILE" | head -1 | sed -E 's/.*"([^"]+)"$/\1/')
          APP_ID=$(grep -o '"mobilesdk_app_id"[[:space:]]*:[[:space:]]*"[^"]*"' "$FILE" | head -1 | sed -E 's/.*"([^"]+)"$/\1/')

          echo "Detected package_name: $PACKAGE"
          echo "Detected mobilesdk_app_id: $APP_ID"

          if [ "$PACKAGE" != "$PACKAGE_NAME" ]; then
            echo "ERROR: google-services package_name ($PACKAGE) != expected PACKAGE_NAME ($PACKAGE_NAME)"
            exit 1
          fi

          echo "✓ Firebase config package matches expected Android package"
      - name: Upgrade Gradle wrapper
        script: |
          WRAPPER_PROPS="android/gradle/wrapper/gradle-wrapper.properties"
          sed -i "s|distributionUrl=.*|distributionUrl=https\\\\://services.gradle.org/distributions/gradle-9.1.0-all.zip|" "$WRAPPER_PROPS"
          echo "Gradle wrapper set to 9.1.0"
      - name: Run post-sync patcher
        script: |
          node scripts/fix-proguard.cjs
      - name: Set app icon
        script: |
          ICON_SOURCE="resources/android/AppIcon.png"
          if [ ! -f "$ICON_SOURCE" ]; then
            ICON_SOURCE="resources/ios/AppIcon.png"
          fi
          if [ -f "$ICON_SOURCE" ]; then
            RES_DIR="android/app/src/main/res"
            for PAIR in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              DENSITY="${PAIR%%:*}"
              SIZE="${PAIR##*:}"
              MIPMAP_DIR="$RES_DIR/mipmap-$DENSITY"
              mkdir -p "$MIPMAP_DIR"
              npx sharp-cli -i "$ICON_SOURCE" -o "$MIPMAP_DIR/ic_launcher.png" resize "$SIZE" "$SIZE" 2>/dev/null || \
                convert "$ICON_SOURCE" -resize "${SIZE}x${SIZE}" "$MIPMAP_DIR/ic_launcher.png" 2>/dev/null || \
                cp "$ICON_SOURCE" "$MIPMAP_DIR/ic_launcher.png"
              cp "$MIPMAP_DIR/ic_launcher.png" "$MIPMAP_DIR/ic_launcher_round.png"
            done
            echo "App icons generated"
          else
            echo "No icon source found, using default"
          fi
      - name: Increment version code and set version name
        script: |
          LATEST=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME" --tracks internal 2>/dev/null || echo "0")
          NEXT=$(( ${LATEST:-0} + 1 ))
          if [ "$NEXT" -lt 2 ]; then NEXT=2; fi
          VERSION="${APP_VERSION_BASE}.${NEXT}"
          echo "Setting versionCode=$NEXT, versionName=$VERSION"
          cd android
          UPDATED=0
          if [ -f app/build.gradle ]; then
            perl -i -pe "s/^\s*versionCode\b.*$/        versionCode $NEXT/" app/build.gradle
            perl -i -pe "s/^\s*versionName\b.*$/        versionName \"$VERSION\"/" app/build.gradle
            echo "Patched app/build.gradle"
            grep -n "versionCode\|versionName" app/build.gradle | head -5
            UPDATED=1
          fi
          if [ -f app/build.gradle.kts ]; then
            perl -i -pe "s/^\s*versionCode\b.*$/        versionCode = $NEXT/" app/build.gradle.kts
            perl -i -pe "s/^\s*versionName\b.*$/        versionName = \"$VERSION\"/" app/build.gradle.kts
            echo "Patched app/build.gradle.kts"
            grep -n "versionCode\|versionName" app/build.gradle.kts | head -5
            UPDATED=1
          fi
          if [ "$UPDATED" -eq 0 ]; then
            echo "ERROR: Could not find app/build.gradle or app/build.gradle.kts to patch"
            find . -maxdepth 4 -name "build.gradle*" -print
            exit 1
          fi
      - name: Generate release notes
        script: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log "$LAST_TAG"..HEAD --pretty=format:"• %s" --no-merges | head -20)
          else
            NOTES=$(git log --pretty=format:"• %s" --no-merges -10)
          fi
          NOTES=$(echo "$NOTES" | sed 's/• [a-z]*[(a-z)]*: /• /g; s/• [a-z]*: /• /g')
          if [ -z "$NOTES" ]; then
            NOTES="• Bug fixes and improvements"
          fi
          echo "Release notes:"
          echo "$NOTES"
          echo "RELEASE_NOTES<<EOF" >> $CM_ENV
          echo "$NOTES" >> $CM_ENV
          echo "EOF" >> $CM_ENV
      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease
      - name: Ensure AAB is signed
        script: |
          AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB_PATH" ]; then
            echo "ERROR: AAB not found at $AAB_PATH"
            exit 1
          fi

          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "$CM_KEYSTORE_PATH" \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -keypass "$CM_KEY_PASSWORD" \
            "$AAB_PATH" "$CM_KEY_ALIAS"

          echo "Verifying AAB signature..."
          jarsigner -verify -verbose -certs "$AAB_PATH"

          echo "=== SIGNER FINGERPRINTS FROM FINAL AAB ==="
          keytool -printcert -jarfile "$AAB_PATH" | grep -E "SHA1:|SHA256:|SHA-1:|SHA-256:" || {
            echo "ERROR: Could not extract signer fingerprints from final AAB"
            exit 1
          }

          echo "=== FIREBASE API KEY INSIDE PACKAGED google-services.json ==="
          grep -o '"current_key"[[:space:]]*:[[:space:]]*"[^"]*"' android/app/google-services.json | head -1 || true

          echo "AAB signed and verified."
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
      email:
        recipients:
          - tzolakis@gmail.com
        notify:
          success: true
          failure: true
